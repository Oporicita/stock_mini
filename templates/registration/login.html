<!DOCTYPE html>
<html>
<head>
    <title>Login - Stock Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f4f6f8;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
        .login-card{background:white;border-radius:16px;padding:40px;width:100%;max-width:400px;border:0.5px solid #e0e0e0;box-shadow:0 10px 40px rgba(0,0,0,0.08);}
        .login-logo{text-align:center;margin-bottom:30px;}
        .login-logo h1{font-size:28px;font-weight:700;color:#007070;margin:0;}
        .login-logo p{color:#888;font-size:13px;margin:6px 0 0;}
        .form-label{font-size:13px;font-weight:500;color:#444;}
        .form-control{border-radius:8px;border:0.5px solid #ddd;font-size:13px;padding:10px 14px;}
        .form-control:focus{border-color:#007070;box-shadow:0 0 0 3px rgba(0,112,112,0.1);outline:none;}
        .btn-login{background:#007070;border:none;color:white;padding:12px;border-radius:8px;font-size:14px;font-weight:500;width:100%;transition:all 0.2s;}
        .btn-login:hover{background:#005f5f;transform:translateY(-1px);}
        .error{background:#fdecea;color:#c0392b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <h1>📦 Stock MS</h1>
            <p>Stock Management System</p>
        </div>
        {% if form.errors %}
        <div class="error">❌ Wrong username or password. Please try again.</div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">🔐 Login</button>
        </form>
    </div>
</body>
</html>
