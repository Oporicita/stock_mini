{% extends 'base.html' %}
{% block content %}
<h1 class="mb-4">{% if order %}Edit{% else %}Add{% endif %} Purchase Order</h1>
<form method="POST" style="background:white;padding:30px;border-radius:15px;">
    {% csrf_token %}
    {% if not order %}
    <div class="mb-3"><label>Product</label>
    <select name="product" class="form-control">
    {% for product in products %}<option value="{{ product.id }}">{{ product.name }}</option>{% endfor %}
    </select></div>
    <div class="mb-3"><label>Supplier</label>
    <select name="supplier" class="form-control">
    {% for supplier in suppliers %}<option value="{{ supplier.id }}">{{ supplier.name }}</option>{% endfor %}
    </select></div>
    {% endif %}
    <div class="mb-3"><label>Quantity</label><input type="number" name="quantity" value="{{ order.quantity }}" class="form-control" required></div>
    <div class="mb-3"><label>Status</label>
    <select name="status" class="form-control">
        <option value="pending">Pending</option>
        <option value="received">Received</option>
        <option value="cancelled">Cancelled</option>
    </select></div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="/purchase-orders/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
