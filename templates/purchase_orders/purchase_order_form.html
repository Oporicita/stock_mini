{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1>{% if order %}✏️ Edit Order{% else %}➕ Add Purchase Order{% endif %}</h1>
</div>
<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        {% if not order %}
        <div class="mb-3">
            <label class="form-label">Product</label>
            <select name="product" class="form-control">
            {% for product in products %}
            <option value="{{ product.id }}">{{ product.name }}</option>
            {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Supplier</label>
            <select name="supplier" class="form-control">
            {% for supplier in suppliers %}
            <option value="{{ supplier.id }}">{{ supplier.name }}</option>
            {% endfor %}
            </select>
        </div>
        {% endif %}
        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" value="{{ order.quantity }}" class="form-control" placeholder="0" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-control">
                <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>⏳ Pending</option>
                <option value="received" {% if order.status == 'received' %}selected{% endif %}>✅ Received</option>
                <option value="cancelled" {% if order.status == 'cancelled' %}selected{% endif %}>❌ Cancelled</option>
            </select>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn-save">💾 Save Order</button>
            <a href="/purchase-orders/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
