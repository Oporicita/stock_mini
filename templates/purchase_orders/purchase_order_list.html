{% extends 'base.html' %}
{% block content %}
<h1 class="mb-4">Purchase Orders</h1>
<a href="/purchase-orders/add/" class="btn btn-success mb-3">+ Add Order</a>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Product</th><th>Supplier</th><th>Quantity</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.product.name }}</td>
        <td>{{ order.supplier.name }}</td>
        <td>{{ order.quantity }}</td>
        <td>{{ order.status }}</td>
        <td>
            <a href="/purchase-orders/edit/{{ order.id }}/" class="btn btn-sm btn-primary">Edit</a>
            <a href="/purchase-orders/delete/{{ order.id }}/" class="btn btn-sm btn-danger">Delete</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
