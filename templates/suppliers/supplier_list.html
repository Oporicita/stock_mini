{% extends 'base.html' %}
{% block content %}
<h1 class="mb-4">Suppliers</h1>
<a href="/suppliers/add/" class="btn btn-success mb-3">+ Add Supplier</a>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Actions</th></tr></thead>
    <tbody>
    {% for supplier in suppliers %}
    <tr>
        <td>{{ supplier.id }}</td>
        <td>{{ supplier.name }}</td>
        <td>{{ supplier.email }}</td>
        <td>{{ supplier.phone }}</td>
        <td>
            <a href="/suppliers/edit/{{ supplier.id }}/" class="btn btn-sm btn-primary">Edit</a>
            <a href="/suppliers/delete/{{ supplier.id }}/" class="btn btn-sm btn-danger">Delete</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
