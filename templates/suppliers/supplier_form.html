{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1>{% if supplier %}✏️ Edit Supplier{% else %}➕ Add Supplier{% endif %}</h1>
</div>
<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Supplier Name</label>
            <input type="text" name="name" value="{{ supplier.name }}" class="form-control" placeholder="e.g. ABC Traders" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" value="{{ supplier.email }}" class="form-control" placeholder="email@example.com">
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" value="{{ supplier.phone }}" class="form-control" placeholder="+1 234 567 8900">
        </div>
        <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control" rows="3" placeholder="Full address">{{ supplier.address }}</textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn-save">💾 Save Supplier</button>
            <a href="/suppliers/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
