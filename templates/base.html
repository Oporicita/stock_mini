<!DOCTYPE html>
<html>
<head>
    <title>Stock Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#F5F7FA;font-family:'Segoe UI',sans-serif;margin:0;padding:0;}
        .sidebar{height:100vh;background:linear-gradient(180deg,#008080,#006D6D);color:white;position:fixed;width:220px;padding-top:20px;box-shadow:4px 0 15px rgba(0,0,0,0.15);}
        .logo{text-align:center;font-size:28px;font-weight:bold;margin-bottom:30px;}
        .sidebar a{color:white;text-decoration:none;display:block;padding:12px 20px;margin:8px 12px;border-radius:12px;transition:0.3s;font-size:16px;}
        .sidebar a:hover{background:rgba(255,255,255,0.18);color:white;}
        .main-content{margin-left:220px;padding:25px;}
        .topbar{background:white;padding:18px 25px;border-radius:15px;box-shadow:0 3px 12px rgba(0,0,0,0.08);margin-bottom:25px;}
        .topbar h2{margin:0;color:#222;font-weight:600;}
        .stat-card{background:white;border-radius:15px;padding:20px;margin-bottom:20px;transition:.3s;}
        .stat-card:hover{transform:translateY(-3px);}
        .blue{border:2px solid #3498DB;box-shadow:0 0 15px rgba(52,152,219,.35);}
        .green{border:2px solid #2ECC71;box-shadow:0 0 15px rgba(46,204,113,.35);}
        .orange{border:2px solid #F39C12;box-shadow:0 0 15px rgba(243,156,18,.35);}
        .purple{border:2px solid #9B59B6;box-shadow:0 0 15px rgba(155,89,182,.35);}
        table{background:white;}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">📦 Stock MS</div>
        <a href="/">🏠 Dashboard</a>
        <a href="/products/">📦 Products</a>
        <a href="/suppliers/">🚚 Suppliers</a>
        <a href="/inventory/">📊 Inventory</a>
        <a href="/purchase-orders/">🛒 Purchase Orders</a>
        <a href="/transactions/">💳 Transactions</a>
        <a href="/reports/">📈 Reports</a>
    </div>
    <div class="main-content">
        <div class="topbar">
            <h2>Stock Management System</h2>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
