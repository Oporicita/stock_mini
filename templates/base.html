<!DOCTYPE html>
<html>
<head>
    <title>Stock ERP System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: system-ui, Arial;
        }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            background: #0f766e;
            color: white;
            padding: 15px 0;
        }

        .sidebar h4 {
            padding: 10px 20px;
            margin-bottom: 10px;
        }

        .sidebar a {
            display: block;
            padding: 10px 20px;
            color: #e6fffb;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.15);
        }

        .sidebar small {
            padding: 10px 20px;
            display: block;
            opacity: 0.6;
        }

        /* MAIN */
        .main {
            margin-left: 230px;
            padding: 20px;
        }

        /* TOP BAR */
        .topbar {
            background: white;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* CARDS */
        .card-box {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* TABLE */
        .table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background: #e6fffb;
        }

        .table thead th {
            color: #0f766e;
        }

        /* BUTTONS */
        .btn-primary {
            background: #0f766e;
            border: none;
        }

        .btn-primary:hover {
            background: #0b5e57;
        }

        .btn-warning, .btn-danger {
            font-size: 13px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4>📦 Stock ERP</h4>

    <small>Main</small>
    <a href="/">Dashboard</a>

    <small>Management</small>
    <a href="/products/">Products</a>
    <a href="/suppliers/">Suppliers</a>
    <a href="/inventory/">Inventory</a>

    <small>Operations</small>
    <a href="/transactions/">Transactions</a>
    <a href="/purchase-orders/">Purchase Orders</a>
    <a href="/reports/">Reports</a>

    <small>System</small>
    <a href="/admin/">Admin</a>

</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h5 class="mb-0">Stock Management System</h5>
        <span class="badge bg-success">System Online</span>
    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
