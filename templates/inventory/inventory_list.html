{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>Inventory</h2>

    <div>

        <button class="btn btn-success">
            Stock In
        </button>

        <button class="btn btn-danger">
            Stock Out
        </button>

    </div>

</div>

<div class="card shadow-sm">

    <div class="card-body">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Product Name</th>
                    <th>Available Stock</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>1</td>
                    <td>Laptop</td>
                    <td>20</td>

                    <td>
                        <span class="badge bg-success">
                            In Stock
                        </span>
                    </td>

                    <td>

                        <button class="btn btn-warning btn-sm">
                            Edit
                        </button>

                    </td>

                </tr>

                <tr>
                    <td>2</td>
                    <td>Mouse</td>
                    <td>100</td>

                    <td>
                        <span class="badge bg-success">
                            In Stock
                        </span>
                    </td>

                    <td>

                        <button class="btn btn-warning btn-sm">
                            Edit
                        </button>

                    </td>

                </tr>

                <tr>
                    <td>3</td>
                    <td>Keyboard</td>
                    <td>3</td>

                    <td>
                        <span class="badge bg-danger">
                            Low Stock
                        </span>
                    </td>

                    <td>

                        <button class="btn btn-warning btn-sm">
                            Edit
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
