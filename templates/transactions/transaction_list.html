{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>Transactions</h2>

    <button class="btn btn-success">
        New Transaction
    </button>

</div>

<div class="card shadow-sm">

    <div class="card-body">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Product</th>
                    <th>Type</th>
                    <th>Quantity</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>1</td>
                    <td>01-06-2026</td>
                    <td>Laptop</td>

                    <td>
                        <span class="badge bg-success">
                            Stock In
                        </span>
                    </td>

                    <td>10</td>

                    <td>
                        <button class="btn btn-primary btn-sm">
                            View
                        </button>
                    </td>

                </tr>

                <tr>
                    <td>2</td>
                    <td>01-06-2026</td>
                    <td>Mouse</td>

                    <td>
                        <span class="badge bg-danger">
                            Stock Out
                        </span>
                    </td>

                    <td>5</td>

                    <td>
                        <button class="btn btn-primary btn-sm">
                            View
                        </button>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
