{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1>➕ Add Transaction</h1>
</div>
<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Product</label>
            <select name="product" class="form-control">
            {% for product in products %}
            <option value="{{ product.id }}">{{ product.name }}</option>
            {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Transaction Type</label>
            <select name="transaction_type" class="form-control">
                <option value="in">⬆️ Stock In</option>
                <option value="out">⬇️ Stock Out</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" class="form-control" placeholder="0" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Note (optional)</label>
            <textarea name="note" class="form-control" rows="2" placeholder="Any notes..."></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn-save">💾 Save Transaction</button>
            <a href="/transactions/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
