{% extends 'base.html' %}

{% block content %}

<h1>Add Product</h1>

<form method="POST">
    {% csrf_token %}
    {% csrf_token %}

    <div class="mb-3">
        <label>Product Name</label>
        <input type="text" class="form-control">
    </div>

    <div class="mb-3">
        <label>Price</label>
        <input type="number" class="form-control">
    </div>

    <div class="mb-3">
        <label>Stock</label>
        <input type="number" class="form-control">
    </div>

    <button type="submit" class="btn btn-success">
        Save Product
    </button>

</form>

{% endblock %}
