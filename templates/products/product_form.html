{% extends 'base.html' %}
{% block content %}
<h1 class="mb-4">{% if product %}Edit{% else %}Add{% endif %} Product</h1>
<form method="POST" style="background:white;padding:30px;border-radius:15px;">
    {% csrf_token %}
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Description</label>
        <textarea name="description" class="form-control">{{ product.description }}</textarea>
    </div>
    <div class="mb-3">
        <label>Price</label>
        <input type="number" name="price" value="{{ product.price }}" class="form-control" step="0.01" required>
    </div>
    <div class="mb-3">
        <label>Quantity</label>
        <input type="number" name="quantity" value="{{ product.quantity }}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="/products/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
